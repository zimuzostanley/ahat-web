<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ahat.web — Android Heap Analysis Tool</title>
    <style>
      /* Inline critical bg so there's no white flash before Tailwind loads */
      html { background-color: #fafaf9; }
      html.dark { background-color: #0c0a09; color-scheme: dark; }
    </style>
    <script>
      // Apply dark mode class before first paint
      try {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch(e) {}
    </script>
  </head>
  <body class="bg-stone-50 dark:bg-stone-950 transition-colors">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
